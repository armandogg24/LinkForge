<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Stack | Todos tus links en un solo lugar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- Lucide Icons Library (versión fija por seguridad) -->
    <script src="https://unpkg.com/lucide@0.263.1"></script>
</head>
<body class="dark-mode">

    <!-- Decoración de fondo -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Navegación -->
    <nav class="glass-nav">
        <a href="./" class="logo">Link<span>Stack</span></a>
        <div class="nav-links" id="nav-auth">
            <button id="btn-login" class="btn-secondary">Entrar</button>
            <button id="btn-register" class="btn-primary">Empezar gratis</button>
        </div>
        <div class="nav-links hidden" id="nav-user">
            <button id="btn-dashboard" class="btn-secondary">Panel</button>
            <button id="btn-logout" class="btn-text">Cerrar sesión</button>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <main id="app-container">
        <!-- El contenido se cargará dinámicamente aquí -->
    </main>

    <!-- Footer Global -->
    <footer class="global-footer">
        <p>Developed with ❤ by <a href="https://github.com/armandogg24" target="_blank" rel="noopener noreferrer">Armando Gonzalez</a></p>
    </footer>

    <!-- Modales / Vistas Temporales (Auth) -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-content glass">
            <button class="close-modal">&times;</button>
            <div id="auth-forms">
                <!-- Se inyecta por JS -->
            </div>
        </div>
    </div>

    <!-- Scripts del Proyecto -->
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
    <script src="profile.js"></script>
    <script src="app.js"></script>
</body>
</html>
